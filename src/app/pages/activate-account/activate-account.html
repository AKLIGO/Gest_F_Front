<div class="min-h-screen bg-gradient-to-br from-blue-50 via-indigo-50 to-purple-50 relative overflow-hidden flex items-center justify-center py-12 px-4">
  <!-- Background Pattern -->
  <div class="absolute inset-0 opacity-20 bg-dot-pattern"></div>
  
  <!-- Floating Elements -->
  <div class="absolute top-20 left-10 w-20 h-20 bg-blue-200 rounded-full opacity-20 animate-float"></div>
  <div class="absolute top-40 right-20 w-16 h-16 bg-purple-200 rounded-full opacity-20 animate-float-delayed"></div>
  <div class="absolute bottom-40 left-20 w-12 h-12 bg-indigo-200 rounded-full opacity-20 animate-float"></div>

  <div class="relative z-10 max-w-md w-full">
    <!-- Card Container -->
    <div class="bg-white/80 backdrop-blur-sm rounded-3xl shadow-2xl border border-white/20 p-8">
      <!-- Header -->
      <div class="text-center mb-8">
        <div class="mx-auto h-16 w-16 bg-gradient-to-r from-blue-600 to-purple-600 rounded-2xl flex items-center justify-center shadow-lg mb-6">
          <i class="fas fa-check-circle text-white text-2xl"></i>
        </div>
        <h2 class="text-3xl font-bold text-gray-900 mb-2">
          Activation du compte
        </h2>
        <p class="text-gray-600">
          Veuillez entrer le code d'activation reçu par e-mail.
        </p>
      </div>

      <!-- Formulaire -->
      <form (ngSubmit)="activate()" class="space-y-6">
        <div class="space-y-2">
          <label for="activationCode" class="block text-sm font-medium text-gray-700 text-center">
            <i class="fas fa-key mr-2 text-blue-500"></i>Code d'activation
          </label>
          <input
            id="activationCode"
            type="text"
            maxlength="6"
            [(ngModel)]="activateCode"
            name="activateCode"
            placeholder="Entrez le code ici"
            required
            class="w-full px-4 py-3 text-center text-2xl font-mono tracking-widest border-2 border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all duration-200 bg-gray-50 focus:bg-white"
          />
        </div>

        <button 
          type="submit" 
          [disabled]="isLoading"
          class="w-full py-4 px-6 border border-transparent text-sm font-semibold rounded-xl text-white bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-700 hover:to-purple-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 disabled:opacity-50 disabled:cursor-not-allowed transition-all duration-200 transform hover:scale-105 shadow-lg flex items-center justify-center"
        >
          <span *ngIf="!isLoading" class="flex items-center">
            <i class="fas fa-check mr-2"></i>
            Activer le compte
          </span>
          <span *ngIf="isLoading" class="flex items-center">
            <i class="fas fa-spinner fa-spin mr-2"></i>
            Activation...
          </span>
        </button>
      </form>

      <!-- Message -->
      <div *ngIf="message" class="mt-6 rounded-xl p-4 border" 
           [ngClass]="{ 
             'bg-green-50 border-green-200': isSuccess, 
             'bg-red-50 border-red-200': !isSuccess 
           }">
        <div class="flex items-center">
          <div class="flex-shrink-0">
            <i class="fas" 
               [ngClass]="{ 
                 'fa-check-circle text-green-500': isSuccess, 
                 'fa-exclamation-circle text-red-500': !isSuccess 
               }"></i>
          </div>
          <div class="ml-3">
            <p class="text-sm font-medium" 
               [ngClass]="{ 
                 'text-green-700': isSuccess, 
                 'text-red-700': !isSuccess 
               }">
              {{ message }}
            </p>
          </div>
        </div>
      </div>

      <!-- Loading Indicator -->
      <div *ngIf="isLoading" class="mt-6 text-center">
        <div class="inline-flex items-center text-blue-600">
          <i class="fas fa-spinner fa-spin mr-2"></i>
          <span class="text-sm font-medium">Veuillez patienter...</span>
        </div>
      </div>
    </div>
  </div>
</div>
